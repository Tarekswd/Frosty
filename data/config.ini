# AntiGravity Chatbot — Configuration File
# All settings are optional; defaults are used for missing keys.

[server]
port=8080
threads=4

[memory]
window_size=20
persist_path=data/history.bin

[model]
responses_path=data/responses.txt
vocab_path=data/vocab.txt

[antigravity]
enabled=true

[log]
level=info
